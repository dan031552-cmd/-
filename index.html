<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנת חולצה מודפסת</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Rubik', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #111;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            background-color: #f0f0f0;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #666;
        }

        .tab.active {
            background-color: #007bff;
            color: white;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,123,255,0.3);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 14px;
            color: #444;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #007bff;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            background: #fff;
        }

        .option-btn.active {
            border-color: #007bff;
            background-color: #eef6ff;
            color: #007bff;
            font-weight: 700;
        }

        .coupon-container {
            display: flex;
            gap: 10px;
        }

        .coupon-container input {
            flex: 1;
        }

        .coupon-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.3s;
        }

        .coupon-btn:hover {
            background-color: #555;
        }

        .total-box {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #e9ecef;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 800;
            color: #111;
        }

        .btn-order {
            width: 100%;
            background-color: #25d366;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-order:hover {
            background-color: #20ba5a;
            transform: translateY(-2px);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>הזמנת חולצה מודפסת</h1>

    <!-- אופן אספקה -->
    <div class="tabs">
        <div class="tab active" onclick="setDelivery('pickup', this)">איסוף עצמי</div>
        <div class="tab" onclick="setDelivery('shipping', this)">משלוח לבית (+30 ₪)</div>
    </div>

    <!-- פרטי לקוח -->
    <div class="form-group">
        <label>שם מלא *</label>
        <input type="text" id="cust-name" placeholder="הכנס שם מלא">
    </div>

    <div class="form-group hidden" id="address-group">
        <label>כתובת למשלוח *</label>
        <input type="text" id="cust-address" placeholder="עיר, רחוב, מספר בית, דירה">
    </div>

    <!-- פרטי חולצה -->
    <div class="form-group">
        <label>צבע חולצה</label>
        <select id="color">
            <option value="שחור">שחור</option>
            <option value="לבן">לבן</option>
            <option value="אפור">אפור</option>
            <option value="כחול נייבי">כחול נייבי</option>
        </select>
    </div>

    <div class="form-group">
        <label>מידה</label>
        <select id="size">
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
        </select>
    </div>

    <div class="form-group">
        <label>כמות</label>
        <input type="number" id="qty" value="1" min="1" onchange="calculateTotal()" oninput="calculateTotal()">
    </div>

    <!-- סוג הדפסה -->
    <div class="form-group">
        <label>מיקום הדפסה</label>
        <div class="options-grid">
            <div class="option-btn active" id="print-front" onclick="setPrintType('front')">קדמי בלבד</div>
            <div class="option-btn" id="print-back" onclick="setPrintType('back')">קדמי + גב (+20 ₪)</div>
        </div>
    </div>

    <div class="form-group hidden" id="back-details-group">
        <label>מה להדפיס על הגב?</label>
        <input type="text" id="back-details" placeholder="טקסט או תיאור ההדפסה לגב">
    </div>

    <!-- קוד קופון -->
    <div class="form-group">
        <label>קוד קופון</label>
        <div class="coupon-container">
            <input type="text" id="coupon-code" placeholder="הכנס קוד קופון">
            <button type="button" class="coupon-btn" onclick="applyCoupon()">הפעל</button>
        </div>
    </div>

    <div class="form-group">
        <label>הערות נוספות</label>
        <textarea id="notes" rows="2" placeholder="דגשים נוספים להזמנה..."></textarea>
    </div>

    <!-- סיכום -->
    <div class="total-box">
        <div class="price-row">
            <span>סה"כ לתשלום:</span>
            <span><span id="total">60</span> ₪</span>
        </div>
    </div>

    <button class="btn-order" onclick="order()">
        שליחת הזמנה בוואטסאפ
    </button>
</div>

<script>
    let deliveryMethod = 'pickup';
    let printType = 'front';
    let basePrice = 60;
    let shippingCost = 0;
    let backPrintCost = 0;
    let discount = 0;

    function setDelivery(method, tabElement) {
        deliveryMethod = method;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tabElement.classList.add('active');

        const addressGroup = document.getElementById('address-group');
        if (method === 'shipping') {
            addressGroup.classList.remove('hidden');
            shippingCost = 30;
        } else {
            addressGroup.classList.add('hidden');
            shippingCost = 0;
        }
        calculateTotal();
    }

    function setPrintType(type) {
        printType = type;
        document.getElementById('print-front').classList.toggle('active', type === 'front');
        document.getElementById('print-back').classList.toggle('active', type === 'back');

        const backDetailsGroup = document.getElementById('back-details-group');
        if (type === 'back') {
            backDetailsGroup.classList.remove('hidden');
            backPrintCost = 20;
        } else {
            backDetailsGroup.classList.add('hidden');
            backPrintCost = 0;
        }
        calculateTotal();
    }

    function applyCoupon() {
        let code = document.getElementById('coupon-code').value.trim();
        if (code === '2324') {
            discount = 10;
        } else {
            discount = 0;
        }
        calculateTotal();
    }

    function calculateTotal() {
        let qty = parseInt(document.getElementById('qty').value) || 1;
        let singleItemPrice = basePrice + backPrintCost;
        let totalPrice = (singleItemPrice * qty) + shippingCost - discount;
        
        if (totalPrice < 0) totalPrice = 0;
        
        document.getElementById('total').innerText = totalPrice;
    }

    function order() {
        let name = document.getElementById('cust-name').value.trim();
        if (!name) { 
            alert('אנא הזן את שמך המלא לפני שליחת ההזמנה.'); 
            return; 
        }

        if (deliveryMethod === 'shipping') {
            let address = document.getElementById('cust-address').value.trim();
            if (!address) { 
                alert('אנא הזן כתובת למשלוח.'); 
                return; 
            }
        }

        let color = document.getElementById('color').value;
        let size = document.getElementById('size').value;
        let qty = document.getElementById('qty').value;
        let notes = document.getElementById('notes').value;
        let total = document.getElementById('total').innerText;
        let deliveryText = (deliveryMethod === 'shipping') ? `משלוח לכתובת: ${document.getElementById('cust-address').value}` : 'איסוף עצמי';
        
        let backPrintDetails = document.getElementById('back-details').value;
        let printDetailsText = (printType === 'back') ? `הדפסה על הגב: "${backPrintDetails}"` : 'הדפסה קדמית בלבד';

        let msg = `היי, אני רוצה להזמין חולצה מודפסת:\n\n👤 שם: ${name}\n🎨 צבע: ${color}\n📏 מידה: ${size}\n🔢 כמות: ${qty}\n🪡 סוג הדפסה: ${printDetailsText}\n🚚 אופן אספקה: ${deliveryText}\n📝 הערות: ${notes}\n\n💰 סה"כ לתשלום: ${total} ₪`;
        
        let encodedMsg = encodeURIComponent(msg);
        let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if (isMobile) {
            window.location.href = `whatsapp://send?phone=972552956401&text=${encodedMsg}`;
        } else {
            window.open(`https://web.whatsapp.com/send?phone=972552956401&text=${encodedMsg}`, '_blank');
        }
    }
</script>

</body>
</html>
