<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אשכנזי הכדור - מכירת חולצות</title>
    <!-- שימוש בשם הקובץ המדויק של הוואטסאפ לאייקון הטאב -->
    <link rel="icon" type="image/jpeg" href="WhatsApp Image 2026-06-26 at 15.01.24.jpeg">

    <style>
        :root {
            --primary: #ff6b00;
            --bg: #0a0f14;
            --card: #1a232d;
            --text: #ffffff;
            --gray: #94a3b8;
            --success: #25d366;
            --danger: #ff3333;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .nav-tabs {
            display: flex;
            justify-content: space-between;
            background: var(--card);
            border: 1px solid rgba(255,107,0,0.2);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--gray);
            padding: 12px 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #000000;
        }

        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255,107,0,0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1 { font-size: 28px; text-align: center; color: #ffffff; margin: 0 0 20px 0; }
        h2 { font-size: 22px; color: var(--primary); margin: 0 0 15px 0; text-align: center; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--gray);
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #0d131a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 18px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .product-images {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .product-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 1px solid rgba(255,107,0,0.3);
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-main {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary { background: var(--primary); color: #000000; }
        .btn-secondary { background: #2d3748; color: #ffffff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; font-size: 12px; border-radius: 5px; border: none; cursor: pointer;}

        .summary-details {
            background: #0d131a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,107,0,0.2);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .summary-row:last-child { border-bottom: none; }

        .order-item, .review-item {
            background: #0d131a;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-trigger-box {
            background: #0d131a;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- תפריט ניווט עליון -->
        <div class="nav-tabs" id="main-nav-tabs">
            <button id="tab-order" class="tab-btn active" onclick="switchMainTab('order')">👕 ביצוע הזמנה</button>
            <button id="tab-reviews" class="tab-btn" onclick="switchMainTab('reviews')">⭐ ביקורות</button>
            <button id="tab-admin" class="tab-btn" onclick="switchMainTab('admin')" style="display:none; border: 1px solid var(--primary);">⚙️ פאנל ניהול</button>
        </div>

        <div id="page-order" class="main-page-section" style="display: block;">
            
            <!-- שלב 1: בחירת מוצר ופרטים ראשוניים -->
            <div id="checkout-step-1" class="step-container active">
                <div class="card">
                    <h1>אשכנזי הכדור - מכירת חולצות</h1>

                    <!-- שדה קוד הניהול הדינמי -->
                    <div class="admin-trigger-box">
                        <label style="margin-bottom: 5px; color: var(--gray);">🔑 קוד זיהוי אתר:</label>
                        <input type="text" id="admin-code-input" value="1502" oninput="checkDynamicAdminCode()" style="text-align: center; letter-spacing: 2px; font-weight: bold; margin-bottom: 0; max-width: 150px; display: inline-block;">
                        <button onclick="checkDynamicAdminCode()" style="background: rgba(255,107,0,0.2); color: #fff; border: 1px solid var(--primary); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-right: 5px;">בדיקת פאנל</button>
                    </div>
                    
                    <!-- תמונות הדוגמן עם שמות קבצי הוואטסאפ המקוריים שלך -->
                    <div class="product-images">
                        <img src="WhatsApp Image 2026-06-26 at 13.26.41.jpeg" alt="חולצה מקדימה" class="product-img">
                        <img src="WhatsApp Image 2026-06-26 at 13.26.38.jpeg" alt="חולצה מאחורה" class="product-img">
                    </div>

                    <div style="background: #0d131a; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px;">
                        <span style="font-size: 13px; color: var(--gray); display: block;">מחיר חולצה:</span>
                        <span style="font-size: 28px; font-weight: 900; color: var(--primary);">70 ₪</span>
                    </div>

                    <label>📏 בחר מידה:</label>
                    <select id="prod-size">
                        <option value="" disabled selected hidden>לחץ לבחירת מידה...</option>
                        <option value="XS">XS (אקסטרה שמאל)</option>
                        <option value="S">S (שמאל)</option>
                        <option value="M">M (מדיום)</option>
                        <option value="L">L (לארג')</option>
                        <option value="XL">XL (אקסטרה לארג')</option>
                        <option value="XXL">XXL (דאבל אקסטרה לארג')</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option><option value="32">32</option><option value="33">33</option><option value="34">34</option><option value="35">35</option><option value="36">36</option><option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option><option value="41">41</option><option value="42">42</option><option value="43">43</option><option value="44">44</option><option value="45">45</option><option value="46">46</option><option value="47">47</option>
                    </select>

                    <label>🔢 כמות חולצות מבוקשת:</label>
                    <input type="number" id="prod-quantity" value="1" min="1">

                    <label>✍️ הערות להדפסה על החולצה:</label>
                    <textarea id="prod-notes" rows="2" placeholder="למשל: מספר 10 מאחורה..."></textarea>

                    <label>🛵 בחר סוג אספקה:</label>
                    <select id="delivery-type" onchange="toggleDeliveryFields()">
                        <option value="pickup" selected>🏠 איסוף עצמי (חינם - 70 ₪ לחולצה)</option>
                        <option value="delivery">📦 משלוח לבית ביבנה (תוספת 10 ₪)</option>
                    </select>

                    <div id="fields-pickup">
                        <label style="color: #ff9d00;">👤 שם מלא לאיסוף עצמי:</label>
                        <input type="text" id="pickup-name" placeholder="הכנס את שמך">
                    </div>

                    <div id="fields-delivery" style="display: none;">
                        <label>👤 שם מלא של המקבל:</label>
                        <input type="text" id="cust-name" placeholder="הכנס את שמך המלא">

                        <label>🏙️ עיר מגורים:</label>
                        <input type="text" value="יבנה" disabled style="background: #1a232d; color: var(--gray); cursor: not-allowed;">

                        <label>🛣️ רחוב ומספר בית:</label>
                        <input type="text" id="cust-street" placeholder="שם הרחוב ומספר הבית">
                    </div>

                    <button class="btn-main btn-primary" style="width: 100%; margin-top: 10px;" onclick="processOrderDetails()">המשך למסך סיכום פרטים ◄</button>
                </div>
            </div>

            <!-- שלב 2: מסך סיכום פרטים -->
            <div id="checkout-step-2" class="step-container">
                <div class="card">
                    <h2>📋 סיכום ההזמנה שלך</h2>
                    <p style="color: var(--gray); font-size: 14px; text-align: center; margin-bottom: 20px;">אנא בדוק שהפרטים נכונים לפני השליחה</p>
                    
                    <div class="summary-details" id="summary-content"></div>

                    <div class="btn-group">
                        <button class="btn-main btn-secondary" onclick="goToStep(1)">✍️ חזור לשינוי פרטים</button>
                        <button class="btn-main btn-success" onclick="confirmAndSendFinalOrder()">✅ אישור ושליחה לוואטסאפ</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- דף ביקורות -->
        <div id="page-reviews" class="main-page-section" style="display: none;">
            <div class="card">
                <h2>ביקורות מהרוכשים שלנו</h2>
                <div id="reviews-container"></div>
            </div>
        </div>

        <!-- פאנל ניהול אדמין סודי -->
        <div id="page-admin" class="main-page-section" style="display: none;">
            <div class="card">
                <h2>⚙️ פאנל ניהול אדמין סודי</h2>
                <h3 style="color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">📦 רשימת הזמנות באתר</h3>
                <div id="admin-orders-container"></div>

                <h3 style="color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-top: 30px;">✍️ הוספת ביקורת יזומה</h3>
                <label>שם המבקר:</label>
                <input type="text" id="new-rev-name">
                <label>תוכן הביקורת:</label>
                <textarea id="new-rev-text" rows="2"></textarea>
                <button class="btn-main btn-primary" onclick="addReviewFromAdmin()">פרסם ביקורת באתר</button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = '972552956401';
        let currentOrderData = {};

        function checkDynamicAdminCode() {
            const codeInput = document.getElementById('admin-code-input').value;
            if (codeInput === '152323') {
                alert('🔓 קוד תקין! פאנל הניהול נפתח כעת בלשונית למעלה.');
                document.getElementById('tab-admin').style.display = 'block';
                switchMainTab('admin');
            } else {
                if (document.getElementById('tab-admin').style.display === 'block' === false) {
                    // אם הקוד לא נכון, מוודאים שהלשונית מוסתרת
                    document.getElementById('tab-admin').style.display = 'none';
                }
            }
        }

        function toggleDeliveryFields() {
            const type = document.getElementById('delivery-type').value;
            if (type === 'pickup') {
                document.getElementById('fields-pickup').style.display = 'block';
                document.getElementById('fields-delivery').style.display = 'none';
            } else {
                document.getElementById('fields-pickup').style.display = 'none';
                document.getElementById('fields-delivery').style.display = 'block';
            }
        }

        function goToStep(stepNum) {
            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active'));
            document.getElementById(`checkout-step-${stepNum}`).classList.add('active');
            window.scrollTo(0, 0);
        }

        function switchMainTab(tabId) {
            document.querySelectorAll('.main-page-section').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${tabId}`).style.display = 'block';
            document.getElementById(`tab-${tabId}`).classList.add('active');
            if(tabId === 'reviews') renderReviews();
            if(tabId === 'admin') renderAdminOrders();
        }

        function processOrderDetails() {
            const selectedSize = document.getElementById('prod-size').value;
            const quantity = parseInt(document.getElementById('prod-quantity').value) || 1;
            const notes = document.getElementById('prod-notes').value.trim() || 'אין הערות';
            const deliveryType = document.getElementById('delivery-type').value;

            if (!selectedSize) { alert('⚠️ אנא בחר מידה לחולצה.'); return; }

            if (deliveryType === 'pickup') {
                const name = document.getElementById('pickup-name').value.trim();
                if (!name) { alert('⚠️ אנא מלא שם לאיסוף עצמי.'); return; }
                
                currentOrderData = {
                    name: name,
                    type: 'איסוף עצמי',
                    street: '—',
                    size: selectedSize,
                    quantity: quantity,
                    notes: notes,
                    shippingCost: 0,
                    totalPrice: 70 * quantity
                };
            } else {
                const name = document.getElementById('cust-name').value.trim();
                let street = document.getElementById('cust-street').value.trim();
                if (!name || !street) { alert('⚠️ נא למלא שם מלא וכתובת מגורים ביבנה.'); return; }

                if (!street.endsWith("/105")) street = street + "/105";

                currentOrderData = {
                    name: name,
                    type: 'משלוח (יבנה בלבד)',
                    street: street,
                    size: selectedSize,
                    quantity: quantity,
                    notes: notes,
                    shippingCost: 10,
                    totalPrice: (70 * quantity) + 10
                };
            }

            const summaryContent = document.getElementById('summary-content');
            summaryContent.innerHTML = `
                <div class="summary-row"><span>סוג אספקה:</span><strong>${currentOrderData.type}</strong></div>
                <div class="summary-row"><span>שם מלא:</span><strong>${currentOrderData.name}</strong></div>
                ${currentOrderData.shippingCost > 0 ? `<div class="summary-row"><span>כתובת למשלוח:</span><strong>עיר: יבנה, רחוב: ${currentOrderData.street}</strong></div>` : ''}
                <div class="summary-row"><span>מידה שבחרת:</span><strong>${currentOrderData.size}</strong></div>
                <div class="summary-row"><span>כמות חולצות:</span><strong>${currentOrderData.quantity}</strong></div>
                <div class="summary-row"><span>הערות להדפסה:</span><strong>${currentOrderData.notes}</strong></div>
                <div class="summary-row" style="margin-top: 10px; border-top: 1px dashed var(--primary); padding-top: 10px;">
                    <span>מחיר חולצות:</span><strong>${70 * currentOrderData.quantity} ₪</strong>
                </div>
                <div class="summary-row"><span>עלות משלוח:</span><strong>${currentOrderData.shippingCost} ₪</strong></div>
                <div class="summary-row" style="font-size: 18px; color: var(--primary); font-weight: bold;">
                    <span>מחיר סופי לתשלום:</span><strong>${currentOrderData.totalPrice} ₪</strong>
                </div>
            `;

            goToStep(2);
        }

        function confirmAndSendFinalOrder() {
            const orders = JSON.parse(localStorage.getItem('site_orders') || '[]');
            orders.push({
                id: Date.now(),
                name: currentOrderData.name,
                city: currentOrderData.shippingCost > 0 ? 'יבנה' : 'איסוף עצמי',
                details: `סוג: ${currentOrderData.type} | מידה: ${currentOrderData.size} | כמות: ${currentOrderData.quantity} | רחוב: ${currentOrderData.street}`,
                status: 'pending',
                date: new Date().toLocaleDateString('he-IL')
            });
            localStorage.setItem('site_orders', JSON.stringify(orders));

            let msg = `👕 הזמנה חדשה מאתר אשכנזי הכדור!\n\n`;
            msg += ` אספקה: ${currentOrderData.type}\n👤 שם: ${currentOrderData.name}\n`;
            if (currentOrderData.shippingCost > 0) {
                msg += `🏙️ עיר: יבנה\n🛣️ כתובת: ${currentOrderData.street}\n`;
            }
            msg += `📏 מידה: ${currentOrderData.size}\n🔢 כמות: ${currentOrderData.quantity}\n✍️ הערות: ${currentOrderData.notes}\n\n💰 סך הכל לתשלום: ${currentOrderData.totalPrice} ₪`;
            
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
            goToStep(1);
        }

        function renderAdminOrders() {
            const container = document.getElementById('admin-orders-container');
            const orders = JSON.parse(localStorage.getItem('site_orders') || '[]');
            if(orders.length === 0) { container.innerHTML = '<div style="color:var(--gray);text-align:center;">אין הזמנות חדשות במערכת.</div>'; return; }
            container.innerHTML = orders.map(o => `
                <div class="order-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <strong>${o.name} (${o.date})</strong>
                        <button class="btn-danger" onclick="deleteOrder(${o.id})">🗑️ מחק</button>
                    </div>
                    <div style="font-size:14px; color:var(--gray);">${o.details}</div>
                </div>
            `).join('');
        }

        function deleteOrder(id) {
            let orders = JSON.parse(localStorage.getItem('site_orders') || '[]');
            orders = orders.filter(o => o.id !== id);
            localStorage.setItem('site_orders', JSON.stringify(orders));
            renderAdminOrders();
        }

        function renderReviews() {
            const container = document.getElementById('reviews-container');
            const reviews = JSON.parse(localStorage.getItem('site_reviews') || '[{"name":"אבי מיוסט","text":"חולצה מטורפת הדפסה ברמה גבוהה!"}]');
            container.innerHTML = reviews.map(r => `
                <div class="review-item"><strong style="color:var(--primary);">⭐ ${r.name}:</strong> <span>"${r.text}"</span></div>
            `).join('');
        }

        function addReviewFromAdmin() {
            const name = document.getElementById('new-rev-name').value.trim();
            const text = document.getElementById('new-rev-text').value.trim();
            if(!name || !text) return;
            const reviews = JSON.parse(localStorage.getItem('site_reviews') || '[]');
            reviews.push({ name, text });
            localStorage.setItem('site_reviews', JSON.stringify(reviews));
            document.getElementById('new-rev-name').value = '';
            document.getElementById('new-rev-text').value = '';
            alert('הביקורת נוספה בהצלחה!');
        }

        window.onload = function() {
            renderReviews();
        };
    </script>
</body>
</html>
