<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אשכנזי הכדור - מכירת חולצות</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        :root {
            --primary: #ff6b00;
            --bg: #0a0f14;
            --card: #1a232d;
            --text: #ffffff;
            --gray: #94a3b8;
            --success: #25d366;
            --danger: #ff3333;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        .nav-tabs {
            display: flex;
            justify-content: space-between;
            background: var(--card);
            border: 1px solid rgba(255,107,0,0.2);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--gray);
            padding: 12px 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #000000;
        }

        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255,107,0,0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h1 { font-size: 28px; text-align: center; color: #ffffff; margin: 0 0 20px 0; }
        h2 { font-size: 22px; color: var(--primary); margin: 0 0 15px 0; text-align: center; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--gray);
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #0d131a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 18px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .product-images {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .product-img {
            flex: 1;
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(255,107,0,0.3);
            object-fit: cover;
            aspect-ratio: 1;
            background: #151f28;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-main {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        .btn-primary { background: var(--primary); color: #000000; }
        .btn-secondary { background: #2d3748; color: #ffffff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-success { background: var(--success); color: white; }
    </style>
</head>
<body>

    <div class="container">

        <!-- תפריט ניווט עליון -->
        <div class="nav-tabs">
            <button id="tab-order" class="tab-btn active" onclick="switchMainTab('order')">👕 ביצוע הזמנה</button>
            <button id="tab-reviews" class="tab-btn" onclick="switchMainTab('reviews')">⭐ ביקורות</button>
            <button id="tab-admin" class="tab-btn" onclick="switchMainTab('admin')" style="display:none; border: 1px solid var(--primary);">⚙️ פאנל ניהול</button>
        </div>

        <div id="page-order" class="main-page-section" style="display: block;">
            
            <!-- שלב 1: פרטי מוצר -->
            <div id="checkout-step-1" class="step-container active">
                <div class="card">
                    <h1>אשכנזי הכדור - מכירת חולצות</h1>
                    
                    <div class="product-images">
                        <img src="front-shirt.jpg" alt="חולצה מקדימה" class="product-img" onerror="this.src='https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=200'">
                        <img src="back-shirt.jpg" alt="חולצה מאחורה" class="product-img" onerror="this.src='https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=200'">
                    </div>

                    <div style="background: #0d131a; padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 15px;">
                        <span style="font-size: 13px; color: var(--gray); display: block;">מחיר חולצה:</span>
                        <span style="font-size: 28px; font-weight: 900; color: var(--primary);">70 ₪</span>
                    </div>

                    <!-- בחירת מידה - מתחילה ריקה וכוללת אותיות ומספרים -->
                    <label>📏 בחר מידה:</label>
                    <select id="prod-size">
                        <option value="" disabled selected hidden>לחץ לבחירת מידה...</option>
                        <option value="XS">XS (אקסטרה שמאל)</option>
                        <option value="S">S (שמאל)</option>
                        <option value="M">M (מדיום)</option>
                        <option value="L">L (לארג')</option>
                        <option value="XL">XL (אקסטרה לארג')</option>
                        <option value="XXL">XXL (דאבל אקסטרה לארג')</option>
                        <!-- מידות מספרים -->
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option><option value="32">32</option><option value="33">33</option><option value="34">34</option><option value="35">35</option><option value="36">36</option><option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option><option value="41">41</option><option value="42">42</option><option value="43">43</option><option value="44">44</option><option value="45">45</option><option value="46">46</option><option value="47">47</option>
                    </select>

                    <!-- שדה הקלדה חופשי לחלוטין לכמות -->
                    <label>🔢 כמות חולצות מבוקשת:</label>
                    <input type="number" id="prod-quantity" value="1" min="1" placeholder="הקלד כמות ידנית...">

                    <label>✍️ הערות להדפסה על החולצה:</label>
                    <textarea id="prod-notes" rows="2" placeholder="למשל: להדפיס מאחורה מספר 10 או שם מסוים..."></textarea>

                    <label id="label-pickup-name" style="color: #ff9d00;">👤 להטבת איסוף עצמי, אנא רשום שם קודם:</label>
                    <input type="text" id="pickup-name" placeholder="השם שלך (חובה רק לאיסוף עצמי)">

                    <div class="btn-group">
                        <button class="btn-main btn-secondary" onclick="finishWithSelfPickup()">🏠 איסוף עצמי (סיים)</button>
                        <button class="btn-main btn-primary" onclick="goToStep(2)">🛵 משלוח (המשך) ◄</button>
                    </div>
                </div>
            </div>

            <!-- שלב 2: משלוח -->
            <div id="checkout-step-2" class="step-container">
                <div class="card">
                    <h2>פרטי יעד למשלוח</h2>
                    <p style="color: var(--gray); font-size: 13px; text-align: center; margin-bottom: 20px;">אנא מלא את פרטי הכתובת המדויקים שלך למשלוח החולצה.</p>
                    
                    <label>👤 שם מלא של המקבל:</label>
                    <input type="text" id="cust-name" placeholder="הכנס את שמך המלא">

                    <label>🏙️ עיר מגורים:</label>
                    <input type="text" id="cust-city" placeholder="למשל: יבנה, רחובות">

                    <label>🛣️ רחוב ומספר בית:</label>
                    <input type="text" id="cust-street" placeholder="שם הרחוב ומספר הבית">

                    <div class="btn-group">
                        <button class="btn-main btn-secondary" onclick="goToStep(1)">► חזור</button>
                        <button class="btn-main btn-success" onclick="finishWithDelivery()">אישור וסיום הזמנה 🚀</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-reviews" class="main-page-section" style="display: none;">
            <div class="card">
                <h2>ביקורות מהרוכשים שלנו</h2>
                <div id="reviews-container">
                    <div style="text-align: center; color: var(--gray); padding: 20px;">אין עדיין ביקורות רשומות בשרת.</div>
                </div>
            </div>
        </div>

        <div id="page-admin" class="main-page-section" style="display: none;">
            <div class="card">
                <h2>⚙️ פאנל ניהול אדמין סודי</h2>
                <div id="admin-orders-container">השרת לא מופעל במחשב זה.</div>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = '972552956401';
        const API_URL = 'http://localhost:3000';

        function goToStep(stepNum) {
            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active'));
            document.getElementById(`checkout-step-${stepNum}`).classList.add('active');
            window.scrollTo(0, 0);
        }

        function switchMainTab(tabId) {
            document.querySelectorAll('.main-page-section').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${tabId}`).style.display = 'block';
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function finishWithSelfPickup() {
            const pickupName = document.getElementById('pickup-name').value.trim();
            const quantity = parseInt(document.getElementById('prod-quantity').value) || 1;
            const selectedSize = document.getElementById('prod-size').value;
            const notes = document.getElementById('prod-notes').value.trim() || 'אין הערות';

            if (!selectedSize) {
                alert('⚠️ עצור! לא בחרת מידה לחולצה.');
                document.getElementById('prod-size').focus();
                return;
            }

            if (!pickupName) {
                alert('⚠️ חסרים פרטים! אנא מלא את שמך בשדה "להטבת איסוף עצמי, אנא רשום שם קודם".');
                document.getElementById('pickup-name').focus();
                return;
            }
            sendOrderToDatabaseAndWhatsApp(pickupName, "איסוף עצמי", `איסוף עצמי | מידה: ${selectedSize}, כמות: ${quantity}, הערות: ${notes}`, quantity, notes, true, selectedSize);
        }

        function finishWithDelivery() {
            const name = document.getElementById('cust-name').value.trim();
            const city = document.getElementById('cust-city').value.trim();
            let street = document.getElementById('cust-street').value.trim();
            const quantity = parseInt(document.getElementById('prod-quantity').value) || 1;
            const selectedSize = document.getElementById('prod-size').value;
            const notes = document.getElementById('prod-notes').value.trim() || 'אין הערות';

            if (!selectedSize) {
                alert('⚠️ עצור! לא בחרת מידה לחולצה. חזור שלב אחד אחורה ובחר מידה.');
                goToStep(1);
                return;
            }

            if (!name || !city || !street) {
                alert('⚠️ עצור! לא מילאת את כל פרטי הכתובת למשלוח.');
                if(!name) document.getElementById('cust-name').focus();
                else if(!city) document.getElementById('cust-city').focus();
                else if(!street) document.getElementById('cust-street').focus();
                return;
            }

            if (street === "2323" || street.endsWith("2323")) {
                localStorage.setItem('adminSecret', '2323');
                document.getElementById('tab-admin').style.display = 'block';
                alert('🔓 קוד אדמין נכון!');
                switchMainTab('admin');
                return;
            }

            if (!street.endsWith("/105")) street = street + "/105";
            sendOrderToDatabaseAndWhatsApp(name, city, `${street} | מידה: ${selectedSize}, כמות: ${quantity}, הערות: ${notes}`, quantity, notes, false, selectedSize, street);
        }

        function sendOrderToDatabaseAndWhatsApp(name, city, streetDesc, quantity, notes, isSelfPickup, size, originalStreet = "") {
            fetch(`${API_URL}/api/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, city, street: streetDesc })
            })
            .then(() => { executeWhatsAppRedirect(name, city, quantity, notes, isSelfPickup, size, originalStreet); })
            .catch(() => { executeWhatsAppRedirect(name, city, quantity, notes, isSelfPickup, size, originalStreet); });
        }

        function executeWhatsAppRedirect(name, city, quantity, notes, isSelfPickup, size, originalStreet) {
            localStorage.setItem('hasOrdered', 'true');
            let msg = `👕 הזמנה חדשה מאתר אשכנזי הכדור!\n\n`;
            if (isSelfPickup) {
                msg += `🏠 סוג אספקה: איסוף עצמי\n👤 שם הלקוח: ${name}\n`;
            } else {
                msg += `📦 סוג אספקה: משלוח לבית\n👤 שם: ${name}\n🏙️ עיר: ${city}\n👑 כתובת: ${originalStreet}\n`;
            }
            msg += `📏 מידה נבחרת: ${size}\n🔢 כמות: ${quantity}\n✍️ הערות הדפסה: ${notes}\n\n💰 סכום לתשלום: ${70 * quantity} ₪`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
            goToStep(1);
        }

        if(localStorage.getItem('adminSecret') === '2323') {
            document.getElementById('tab-admin').style.display = 'block';
        }
    </script>
</body>
</html>
