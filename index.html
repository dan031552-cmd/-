<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אשכנזי - הזמנת חולצות</title>
    <style>
        :root {
            --bg-color: #1a1e29;
            --card-bg: #252b3b;
            --accent-red: #ff4a5a;
            --accent-green: #00c853;
            --text-color: #ffffff;
            --text-muted: #a0aec0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* שדרוג למחשב: מיכל התמונה עם חיתוך גבולות */
        .image-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            overflow: hidden; /* מונע מהתמונה לצאת מהמסגרת בזמן הזום */
        }

        .image-container {
            width: 100%;
            border-radius: 15px;
            overflow: hidden; /* חשוב מאוד לאפקט הזום */
            position: relative;
        }

        /* האפקט המטורף למחשב */
        .image-container img {
            width: 100%;
            display: block;
            transition: transform 0.5s ease; /* הופך את הזום לחלק ונעים לעין */
        }

        /* כשהעכבר עובר על התמונה במחשב */
        @media (hover: hover) {
            .image-container:hover img {
                transform: scale(1.08); /* מגדיל את התמונה ב-8% בצורה חלקה */
            }
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            width: 100%;
        }

        .btn-nav {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-prev { background-color: #3b4252; color: white; }
        .btn-next { background-color: var(--accent-red); color: white; }

        .badge-sale {
            background-color: var(--accent-red);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(255, 74, 90, 0.3);
        }

        .form-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #3b4252;
            border-radius: 12px;
            background-color: #1e2330;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--accent-red);
        }

        .price-box {
            background-color: #1e2330;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 25px;
            border: 1px dashed #3b4252;
        }

        .price-label {
            font-size: 12px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 5px;
        }

        .price-amount {
            font-size: 32px;
            font-weight: bold;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 200, 83, 0.3);
            transition: transform 0.1s, background 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">

    <!-- כרטיס תמונה עם אפקט הזום החדש -->
    <div class="image-card">
        <div class="image-container">
            <!-- שים לב: החלף את ה-URL לתמונה האמיתית של אשכנזי בגיטהאב שלך -->
            <img id="product-img" src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" alt="חולצת אשכנזי">
        </div>
        <div class="nav-buttons">
            <button class="btn-nav btn-prev" onclick="changeImage(-1)">◀ אחורה</button>
            <button class="btn-nav btn-next" onclick="changeImage(1)">קדימה ▶</button>
        </div>
    </div>

    <!-- באנר מבצע -->
    <div class="badge-sale">
        🔥 מבצע: 3 חולצות ומעלה ב-60 ₪ בלבד!
    </div>

    <!-- כרטיס הטופס -->
    <div class="form-card">
        <h1>אשכנזי</h1>
        
        <div class="form-group">
            <label>🎨 צבע חולצה:</label>
            <select id="color" onchange="updatePrice()">
                <option value="לבן">לבן</option>
                <option value="שחור">שחור</option>
            </select>
        </div>

        <div class="form-group">
            <label>📏 מידה / ספה:</label>
            <select id="size">
                <option value="S">S</option>
                <option value="M" selected>M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>
        </div>

        <div class="form-group">
            <label>🔢 כמות:</label>
            <input type="number" id="quantity" value="1" min="1" oninput="updatePrice()">
        </div>

        <div class="form-group">
            <label>💬 הערות להדפסה:</label>
            <textarea id="notes" rows="2" placeholder="למשל: הדפסה על הגב..."></textarea>
        </div>

        <div class="price-box">
            <span class="price-label">סה"כ לתשלום:</span>
            <div class="price-amount"><span id="total-price">70</span> ₪</div>
        </div>

        <button class="btn-submit" onclick="sendToWhatsApp()">✓ שלח הזמנה בוואטסאפ</button>
    </div>

</div>

<script>
    // מערך תמונות (תוכל להחליף לקישורים של התמונות שלך)
    const images = [
        "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500",
        "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=500"
    ];
    let currentImgIndex = 0;

    function changeImage(direction) {
        currentImgIndex += direction;
        if (currentImgIndex < 0) currentImgIndex = images.length - 1;
        if (currentImgIndex >= images.length) currentImgIndex = 0;
        document.getElementById('product-img').src = images[currentImgIndex];
    }

    // חישוב מחיר אוטומטי חכם לפי חוקי המבצע!
    function updatePrice() {
        const qty = parseInt(document.getElementById('quantity').value) || 1;
        let pricePerUnit = 70;
        
        if (qty >= 3) {
            pricePerUnit = 60; // הנחת המבצע!
        }
        
        const total = qty * pricePerUnit;
        document.getElementById('total-price').innerText = total;
    }

    function sendToWhatsApp() {
        const color = document.getElementById('color').value;
        const size = document.getElementById('size').value;
        const qty = document.getElementById('quantity').value;
        const notes = document.getElementById('notes').value;
        const total = document.getElementById('total-price').innerText;

        const baseMessage = `היי אשכנזי, אני רוצה להזמין חולצה!\n\n` +
                            `🎨 צבע: ${color}\n` +
                            `📏 מידה: ${size}\n` +
                            `🔢 כמות: ${qty}\n` +
                            `💬 הערות: ${notes ? notes : 'אין'}\n\n` +
                            `💰 סה"כ לתשלום: ${total} ₪`;

        const whatsappUrl = `https://wa.me/972500000000?text=${encodeURIComponent(baseMessage)}`; // החלף את המספר למספר האמיתי
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
