<!DOCTYPE html>

<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>אשכנזי</title>


<!-- הגדרת ה-Favicon (האייקון הקטן בטאב) -->

<link rel="icon" type="image/jpeg" href="WhatsApp Image 2026-06-26 at 15.01.25.jpeg">


<style>

:root {

--primary: #ff4757;

--whatsapp: #25d366;

--bg-grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);

}



body {

font-family: 'Segoe UI', system-ui, sans-serif;

background: var(--bg-grad);

color: #f8fafc;

text-align: center;

padding: 20px;

margin: 0;

min-height: 100vh;

display: flex;

justify-content: center;

align-items: center;

}



.container {

display: flex;

flex-direction: column;

max-width: 500px;

width: 100%;

gap: 20px;

}



.gallery-container {

background: rgba(255, 255, 255, 0.02);

border: 1px solid rgba(255, 255, 255, 0.08);

border-radius: 24px;

padding: 10px;

text-align: center;

box-shadow: 0 15px 35px rgba(0,0,0,0.3);

overflow: hidden;

}



.main-img-wrapper {

width: 100%;

padding-top: 133%;

position: relative;

background: #111;

border-radius: 16px;

}



.main-img {

position: absolute;

top: 0;

left: 0;

width: 100%;

height: 100%;

object-fit: contain;

transition: opacity 0.2s ease;

}



.gallery-nav {

display: flex;

justify-content: center;

gap: 10px;

margin-top: 15px;

padding-bottom: 5px;

}



.nav-btn {

background: rgba(255, 255, 255, 0.05);

border: 1px solid rgba(255, 255, 255, 0.1);

color: #cbd5e1;

padding: 10px 20px;

border-radius: 30px;

cursor: pointer;

font-weight: 600;

font-size: 14px;

transition: all 0.2s ease;

}



.nav-btn.active, .nav-btn:hover {

background: var(--primary);

border-color: var(--primary);

color: white;

box-shadow: 0 0 15px rgba(255, 71, 87, 0.5);

}



.card {

background: rgba(255, 255, 255, 0.03);

backdrop-filter: blur(16px);

-webkit-backdrop-filter: blur(16px);

border: 1px solid rgba(255, 255, 255, 0.08);

padding: 25px;

border-radius: 24px;

box-shadow: 0 20px 40px rgba(0,0,0,0.4);

text-align: right;

}



.promo {

background: linear-gradient(90deg, #ff4757, #ff6b81); color: white;

padding: 12px;

border-radius: 12px;

margin-bottom: 20px;

font-weight: bold;

font-size: 15px;

text-align: center;

box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);

}



h1 {

margin: 0 0 20px 0;

font-size: 32px;

font-weight: 800;

text-align: center;

background: linear-gradient(45deg, #fff, #cbd5e1);

-webkit-background-clip: text;

-webkit-text-fill-color: transparent;

}


label { display: block; font-weight: 600; margin-bottom: 6px; color: #94a3b8; font-size: 14px; }


select, input, textarea {

width: 100%; padding: 12px; margin-bottom: 15px;

background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);

border-radius: 10px; box-sizing: border-box; font-size: 16px; color: white;

font-family: inherit; transition: all 0.2s ease;

}



select:focus, input:focus, textarea:focus {

outline: none; border-color: var(--primary); background: rgba(255, 255, 255, 0.08);

}



select option { background: #1e293b; color: white; }


.price-box {

background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 12px;

margin: 20px 0; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center;

}



.price { font-size: 34px; font-weight: 800; color: #fff; margin-top: 3px; }


.btn-order {

background: linear-gradient(135deg, var(--whatsapp), #1ed760);

color: white; border: none; width: 100%; padding: 16px; font-size: 18px;

border-radius: 12px; cursor: pointer; font-weight: bold; transition: all 0.3s ease;

margin-bottom: 5px; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);

}



.btn-order:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); }

</style>

</head>

<body>



<div class="container">

<!-- מציג התמונות של החולצות -->

<div class="gallery-container">

<div class="main-img-wrapper">

<img id="product-view" class="main-img" src="WhatsApp Image 2026-06-26 at 13.26.44.jpeg" alt="חולצה קדימה">

</div>

<div class="gallery-nav">

<button class="nav-btn active" onclick="changeView('WhatsApp Image 2026-06-26 at 13.26.44.jpeg', this)">קדימה 👕</button>

<!-- שימוש בקובץ הגב החדש והתקין -->

<button class="nav-btn" onclick="changeView('WhatsApp Image 2026-06-26 at 13.26.44 (1).jpeg', this)">אחורה ↩️</button>

</div>

</div>



<div class="card">

<div class="promo">🔥 מבצע: 3 חולצות ומעלה ב-60 ₪ בלבד!</div>


<h1>אשכנזי</h1>


<label>🎨 צבע חולצה:</label>

<select id="color">

<option>לבן</option>

</select>


<label>📏 מידה / מספר:</label>

<select id="size">

<!-- מידות מספרים מ-1 עד 47 -->

<script>

for (let i = 1; i <= 47; i++) {

document.write(`<option value="${i}">${i}</option>`);

}

</script>

<!-- מידות אותיות רגילות -->

<option value="S">S</option>

<option value="M" selected>M</option>

<option value="L">L</option>

<option value="XL">XL</option>

<option value="XXL">XXL</option>

</select>


<label>🔢 כמות:</label>

<input type="number" id="qty" value="1" min="1" oninput="update()">


<label>📝 הערות להדפסה:</label>

<textarea id="notes" rows="2" placeholder="למשל: הדפסה על הגב..."></textarea>


<div class="price-box">

<div style="color: #94a3b8; font-size: 14px;">סה"כ לתשלום:</div>

<div class="price"><span id="total">70</span> ₪</div>

</div>


<button class="btn-order" onclick="order()">שלח הזמנה בוואטסאפ ✅</button>

</div>

</div>



<script>

function changeView(imgSrc, btn) {

const imgElement = document.getElementById('product-view');

imgElement.style.opacity = 0;


setTimeout(() => {

imgElement.src = imgSrc;

imgElement.style.opacity = 1;

}, 100);



document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

btn.classList.add('active');

}



function update() {

let q = document.getElementById('qty').value;

let p = (q >= 3) ? 60 : 70;

document.getElementById('total').innerText = q * p;

}



function order() {

let color = document.getElementById('color').value;

let size = document.getElementById('size').value;

let qty = document.getElementById('qty').value;

let notes = document.getElementById('notes').value;

let total = document.getElementById('total').innerText;

let msg = `היי, אני רוצה להזמין חולצה מודפסת:\nצבע: ${color}\nמידה: ${size}\nכמות: ${qty}\nהערות: ${notes}\nסה"כ לתשלום: ${total} ₪`;

window.open(`https://wa.me/972552956401?text=${encodeURIComponent(msg)}`);

}

</script>

</body>

</html>
